spring:
  application:
    name: transaction-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/financial_db}
    username: ${DATABASE_USER:financial_user}
    password: ${DATABASE_PASSWORD:financial_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8081}

logging:
  level:
    com.financial.transaction: DEBUG